<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theo's Baseball</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/kids-baseball-app/manifest.webmanifest">

  <link rel="apple-touch-icon" sizes="180x180" href="/kids-baseball-app/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/kids-baseball-app/icons/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/kids-baseball-app/icons/apple-touch-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="76x76"   href="/kids-baseball-app/icons/apple-touch-icon-76x76.png">

  <meta name="theme-color" content="#2A1060">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Theo's Baseball">
</head>
<body>

  <div class="app-shell">

    <!-- ── Sidebar ── -->
    <nav class="sidebar">

      <div class="sidebar-brand">
        <div class="app-mark" role="img" aria-label="Flaming baseball"></div>
        <div class="app-greeting" id="sidebarGreeting"></div>
      </div>

      <div class="sidebar-nav">
        <button class="nav-item" data-route="#/scores">
          <!-- Scoreboard icon -->
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="2" y="4" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6 2v4M14 2v4M2 9.5h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M6 13h2M10 13h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Scores</span>
        </button>

        <button class="nav-item" data-route="#/standings">
          <!-- Trophy icon -->
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M6 2h8v7a4 4 0 0 1-8 0V2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M6 5H3a2 2 0 0 0 0 4h3M14 5h3a2 2 0 0 0 0 4h-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M10 13v4M7 17h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Standings</span>
        </button>

        <button class="nav-item" data-route="#/stats">
          <!-- Chart icon -->
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3 15 L7.5 9 L11.5 12 L17 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17.5h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Stats</span>
        </button>

        <button class="nav-item" data-route="#/ballparks">
          <!-- Stadium arch icon -->
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M2 17V9.5A8 8 0 0 1 18 9.5V17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M5 17v-5.5a5 5 0 0 1 10 0V17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M2 17h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Ballparks</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-date" id="sidebarDate"></div>
      </div>

    </nav>

    <!-- ── Main content ── -->
    <main class="main-content">
      <div id="view"></div>
    </main>

  </div><!-- /.app-shell -->


  <!-- ── Box score overlay ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="boxTitle">
    <div class="modal">
      <header>
        <div class="title" id="boxTitle">Box Score</div>
        <button class="iconbtn" id="boxHlBtn" style="display:none">▶ Highlights</button>
        <button class="close" id="boxClose">Close ✕</button>
      </header>
      <div id="boxContent"></div>
    </div>
  </div>

  <!-- ── Player card overlay ── -->
  <div class="overlay" id="playerOverlay" role="dialog" aria-modal="true" aria-labelledby="playerTitle">
    <div class="modal" id="playerModal">
      <header>
        <div class="title" id="playerTitle">Player</div>
        <button class="close" id="playerClose">Close ✕</button>
      </header>
      <div id="playerContent"></div>
    </div>
  </div>

  <!-- ── Highlights overlay ── -->
  <div class="overlay" id="hlOverlay" role="dialog" aria-modal="true" aria-labelledby="hlTitle">
    <div class="modal">
      <header>
        <div class="title" id="hlTitle">Watch Highlights</div>
        <button class="close" id="hlClose">Close ✕</button>
      </header>
      <div id="hlContent"></div>
    </div>
  </div>

  <!-- ── Venue detail overlay ── -->
  <div class="overlay" id="venueOverlay" role="dialog" aria-modal="true" aria-labelledby="venueTitle">
    <div class="modal modal--venue">
      <header>
        <div class="title" id="venueTitle">Ballpark</div>
        <button class="close" id="venueClose">Close ✕</button>
      </header>
      <div id="venueContent"></div>
    </div>
  </div>


  <!-- ── Game card template ── -->
  <template id="game-card">
    <article class="card">
      <div class="inner">
        <div class="card-top">
          <span class="card-time" data-time></span>
          <span class="pill" data-status>Scheduled</span>
        </div>
        <div class="card-teams">
          <div class="card-team-row">
            <div class="crest" data-crest="away"></div>
            <span class="card-name" data-teamname="away">Away Team</span>
            <span class="card-record" data-record="away"></span>
          </div>
          <div class="card-team-row">
            <div class="crest" data-crest="home"></div>
            <span class="card-name" data-teamname="home">Home Team</span>
            <span class="card-record" data-record="home"></span>
          </div>
        </div>
        <div data-linescore></div>
        <div class="card-pitchers" data-pitchers></div>
        <div class="actions" data-actions></div>
      </div>
    </article>
  </template>


  <script>
    (function(){
      const dateEl   = document.getElementById('sidebarDate');
      const greetEl  = document.getElementById('sidebarGreeting');
      if(dateEl) dateEl.textContent = new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
      if(greetEl) {
        const h = new Date().getHours();
        const msgs =
          h >= 5  && h < 11 ? ['Good morning!', 'Batter up!', 'Rise and shine!'] :
          h >= 11 && h < 14 ? ['Play ball!',    'Game time!', "Let's go!"]        :
          h >= 14 && h < 18 ? ['Step up to the plate!', 'Great day for baseball!', 'Game on!'] :
          h >= 18 && h < 22 ? ['Good evening!', 'Take me out to the ballgame!', 'Night game!'] :
                              ['Extra innings!', 'Baseball never sleeps!', 'Still going?'];
        greetEl.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      }
    })();
  </script>

  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/kids-baseball-app/sw.js').catch(console.error);
      });
    }
  </script>

</body>
</html>
